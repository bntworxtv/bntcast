version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: bntcast-server
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
      - "8001-8100:8001-8100"
    volumes:
      - bntcast-media:/app/media
      - bntcast-config:/app/config
      - bntcast-db:/app/server/prisma
    environment:
      - DATABASE_URL=file:./prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-$(openssl rand -hex 32)}
      - PORT=3001
      - MEDIA_DIR=/app/media
      - NODE_ENV=production
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: bntcast-client
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      server:
        condition: service_healthy

volumes:
  bntcast-media:
  bntcast-config:
  bntcast-db:
